# Sprint Agent Workflow -- 37-data-model
# EVA-STORY: F37-DPDCA-001
# Trigger: GitHub Issue labeled "sprint-task"
#
# Processes a FULL SPRINT from one issue (sprint manifest):
#   - Parses sprint manifest JSON from issue body
#   - Executes each story in sequence: D->P->D->C->A
#   - Posts progress comment after each story
#   - Posts final sprint summary when all stories complete
#
# Sprint manifest format: see .github/sprints/sprint-NN-name.md
# Generated by: scripts/gen-sprint-manifest.py

name: Sprint Agent

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Sprint issue number
        required: true
        type: number

jobs:
  sprint:
    name: "Execute Sprint"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'sprint-task')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --quiet openai httpx pydantic pydantic-settings requests
          pip install -r requirements.txt --quiet 2>/dev/null || true
          pip install pytest pytest-asyncio --quiet

      - name: Resolve issue number
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ISSUE_NUM=${{ inputs.issue_number }}" >> "$GITHUB_ENV"
          else
            echo "ISSUE_NUM=${{ github.event.issue.number }}" >> "$GITHUB_ENV"
          fi

      - name: Configure git identity
        run: |
          git config user.name "37-data-model Sprint Agent"
          git config user.email "agent+data-model@eva-foundry.dev"

      - name: Run sprint agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DATA_MODEL_URL: ${{ secrets.DATA_MODEL_URL || 'https://marco-eva-data-model.livelyflower-7990bc7b.canadacentral.azurecontainerapps.io' }}
          COSMOS_URL: ${{ secrets.COSMOS_URL }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          python3 .github/scripts/sprint_agent.py \
            --issue "$ISSUE_NUM" \
            --repo "$GH_REPO"

      - name: Run tests
        if: success()
        run: |
          pytest tests/ -x -q --tb=short

      - name: Run model validation
        if: success()
        env:
          DATA_MODEL_URL: ${{ secrets.DATA_MODEL_URL || 'https://marco-eva-data-model.livelyflower-7990bc7b.canadacentral.azurecontainerapps.io' }}
        run: |
          python3 -c "
          import requests, sys
          base = '$DATA_MODEL_URL'
          v = requests.get(f'{base}/model/admin/validate', headers={'Authorization': 'Bearer dev-admin'}, timeout=30).json()
          print(f'[INFO] Validation: {v[\"count\"]} violations')
          if v['count'] > 0:
              for err in v['violations'][:10]:
                  print(f'[FAIL] {err}')
              sys.exit(1)
          print('[PASS] Model validation: 0 violations')
          "

      - name: Export to Cosmos
        if: success()
        env:
          DATA_MODEL_URL: ${{ secrets.DATA_MODEL_URL || 'https://marco-eva-data-model.livelyflower-7990bc7b.canadacentral.azurecontainerapps.io' }}
        run: |
          python3 -c "
          import requests
          base = '$DATA_MODEL_URL'
          c = requests.post(f'{base}/model/admin/commit', headers={'Authorization': 'Bearer dev-admin'}, timeout=60).json()
          print(f'[INFO] Commit: status={c[\"status\"]} violations={c[\"violation_count\"]} exported={c[\"exported_total\"]}')
          # On ACA: assemble.rc=-1 is expected (scripts not deployed) -- ignore
          # PASS conditions: violation_count=0 AND exported_total > 0 AND export_errors.Count=0
          if c['violation_count'] > 0:
              print('[FAIL] Commit failed: cross-reference violations detected')
              exit(1)
          if c.get('exported_total', 0) == 0:
              print('[FAIL] Commit failed: export returned 0 objects')
              exit(1)
          print('[PASS] Commit successful')
          "

      - name: Upload sprint artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "sprint-issue-${{ env.ISSUE_NUM }}-artifacts"
          path: |
            sprint-state.json
            sprint-summary.md
            .eva/evidence/
            .eva/veritas-plan.json
            .eva/trust.json
            lint-result.txt
            test-collect.txt
          retention-days: 30

