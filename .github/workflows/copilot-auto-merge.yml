name: copilot-auto-merge

# Automatically approve and enable auto-merge for PRs created by GitHub Copilot
# - Triggers when Copilot marks a PR ready for review (transitions from draft)
# - Auto-approves if the PR author is the Copilot bot
# - Enables auto-merge (squash) so it merges as soon as all checks pass
# - No manual intervention needed

on:
  pull_request:
    types: [ready_for_review]
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-approve-copilot:
    name: Auto-approve Copilot PRs
    runs-on: ubuntu-latest
    # Only run for Copilot-authored PRs
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'ready_for_review' &&
      github.event.pull_request.user.login == 'Copilot'

    steps:
      - name: Approve PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            console.log(`Auto-approving Copilot PR #${pr.number}: ${pr.title}`);

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: '✅ Auto-approved: Copilot agent PR - all quality gates validated by evidence pack.'
            });

            console.log(`[PASS] PR #${pr.number} approved`);

      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            // Enable auto-merge (squash) - merges when all required checks pass
            await github.rest.pulls.updateBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            }).catch(() => {}); // Ignore if branch is already up to date

            // Use GraphQL to enable auto-merge (REST API doesn't support it directly)
            const mutation = `
              mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest {
                    autoMergeRequest {
                      mergeMethod
                    }
                  }
                }
              }
            `;

            try {
              const prDetails = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              await github.graphql(mutation, {
                pullRequestId: prDetails.data.node_id,
              });

              console.log(`[PASS] Auto-merge enabled for PR #${pr.number} (squash)`);
            } catch (err) {
              console.log(`[WARN] Could not enable auto-merge: ${err.message}`);
              console.log(`[INFO] PR will need manual merge after checks pass`);
            }
