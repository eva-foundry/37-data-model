name: veritas-audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: windows-latest
    
    steps:
    - name: Checkout 37-data-model
      uses: actions/checkout@v4
      with:
        path: 37-data-model
      
    - name: Checkout 48-eva-veritas
      uses: actions/checkout@v4
      with:
        repository: eva-foundry/48-eva-veritas
        path: 48-eva-veritas
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install veritas dependencies
      working-directory: 48-eva-veritas
      run: npm install
      
    - name: Run veritas audit
      working-directory: 48-eva-veritas
      continue-on-error: true
      id: veritas_audit
      run: |
        node src/cli.js audit --repo ../37-data-model --threshold 70 --warn-only
        
    - name: Check MTI threshold
      shell: pwsh
      continue-on-error: true
      run: |
        $trustPath = "37-data-model/.eva/trust.json"
        
        if (-not (Test-Path $trustPath)) {
          Write-Host "[WARN] trust.json not found at $trustPath - API may be unreachable in CI"
          exit 0
        }
        
        $trust = Get-Content $trustPath | ConvertFrom-Json
        $mti = $trust.score
        $threshold = 70
        
        Write-Host "MTI Score: $mti (threshold: $threshold)"
        
        if ($mti -lt $threshold) {
          Write-Host "[WARN] MTI=$mti below threshold $threshold - advisory only (API may be unreachable in CI)"
        } else {
          Write-Host "[PASS] MTI=$mti meets threshold $threshold"
        }
