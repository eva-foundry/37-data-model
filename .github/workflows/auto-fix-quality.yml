name: Auto-Fix Quality Issues

# Session 41: Auto-fix banal quality issues in PRs
# Automatically fixes:
# - F541: f-strings without placeholders
# - Unicode characters (replace with ASCII per workspace encoding standards)
# - Other auto-fixable issues
#
# Rationale: Don't waste developer time on trivial formatting issues
# Professional standard: Automate what can be automated

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    name: Auto-fix Banal Issues
    runs-on: ubuntu-latest
    # Only run on PRs from the same repo (not forks, for security)
    if: github.event.pull_request.head.repo.full_name == github.repository
    
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install autopep8 autoflake
      
      - name: Fix F541 - f-strings without placeholders
        id: fix-f541
        run: |
          echo "::group::Fixing F541 errors"
          
          # Find all f-strings without placeholders and convert to regular strings
          find api/ -name "*.py" -type f -exec python3 -c '
import re
import sys

def fix_f541(file_path):
    with open(file_path, "r", encoding="utf-8") as f:
        content = f.read()
    
    original = content
    
    # Pattern: f"string with no {placeholders}"
    # Match f"..." or f'\''...'\'', but only if no {} inside
    pattern = r'\bf(["'\''])((?:(?!\1|\{).)*)\1'
    
    def replace_if_no_placeholder(match):
        quote = match.group(1)
        string_content = match.group(2)
        # If no placeholder braces, remove the f prefix
        if "{" not in string_content:
            return f"{quote}{string_content}{quote}"
        return match.group(0)
    
    content = re.sub(pattern, replace_if_no_placeholder, content)
    
    if content != original:
        with open(file_path, "w", encoding="utf-8") as f:
            f.write(content)
        return True
    return False

if __name__ == "__main__":
    import sys
    changed = fix_f541(sys.argv[1])
    sys.exit(0 if changed else 1)
' {} \; || true
          
          echo "::endgroup::"
      
      - name: Fix Unicode characters (workspace encoding standard)
        id: fix-unicode
        run: |
          echo "::group::Replacing Unicode with ASCII"
          
          # Workspace standard: NEVER use Unicode in scripts (cp1252 crashes)
          # See .github/standards-specification.md
          
          find api/ -name "*.py" -type f -exec python3 -c '
import re
import sys

UNICODE_REPLACEMENTS = {
    "✓": "[PASS]",
    "✅": "[PASS]",
    "✗": "[FAIL]",
    "❌": "[ERROR]",
    "⚠": "[WARN]",
    "⏳": "[WAIT]",
    "🎯": "[TARGET]",
    "📄": "[FILE]",
    "📊": "[DATA]",
    "🔄": "[PROCESSING]",
    "💾": "[SAVE]",
    "🚀": "[LAUNCH]",
    "…": "...",
}

def fix_unicode(file_path):
    with open(file_path, "r", encoding="utf-8") as f:
        content = f.read()
    
    original = content
    
    for unicode_char, ascii_replacement in UNICODE_REPLACEMENTS.items():
        content = content.replace(unicode_char, ascii_replacement)
    
    if content != original:
        with open(file_path, "w", encoding="utf-8") as f:
            f.write(content)
        print(f"Fixed Unicode in {file_path}")
        return True
    return False

if __name__ == "__main__":
    changed = fix_unicode(sys.argv[1])
    sys.exit(0 if changed else 1)
' {} \; || true
          
          echo "::endgroup::"
      
      - name: Remove unused imports
        id: fix-imports
        run: |
          echo "::group::Removing unused imports"
          autoflake --in-place --remove-all-unused-imports --recursive api/ || true
          echo "::endgroup::"
      
      - name: Check for changes
        id: check-changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "::notice::Auto-fixes applied"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "::notice::No auto-fixes needed"
          fi
      
      - name: Commit and push fixes
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          git commit -m "chore: Auto-fix quality issues

- Fix F541: Remove f-string prefix from strings without placeholders
- Replace Unicode characters with ASCII (workspace encoding standard)
- Remove unused imports

Auto-applied by quality gate workflow."
          
          git push
      
      - name: Comment on PR
        if: steps.check-changes.outputs.changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Auto-fixes applied**

The following banal quality issues were automatically fixed:
- ✅ F541 errors (f-strings without placeholders)
- ✅ Unicode characters replaced with ASCII
- ✅ Unused imports removed

**Why?** These are trivial formatting issues that waste developer time. Professional standard: automate what can be automated.

**Workspace Encoding Standard**: We never use Unicode characters in Python scripts because enterprise Windows cp1252 encoding causes crashes. See \`.github/standards-specification.md\` for details.

The quality gate will now re-run with these fixes applied.`
            });
